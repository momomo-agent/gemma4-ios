name: Gemma4iOS
options:
  bundleIdPrefix: com.momo
  deploymentTarget:
    iOS: "17.0"
packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.31.0
  mlx-swift-lm-gemma4:
    path: /tmp/mlx-swift-lm-gemma4
targets:
  Gemma4iOS:
    type: application
    platform: iOS
    sources:
      - Sources/Gemma4iOS
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXRandom
      - package: mlx-swift-lm-gemma4
        product: MLXLLM
      - package: mlx-swift-lm-gemma4
        product: MLXVLM
      - package: mlx-swift-lm-gemma4
        product: MLXLMCommon
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Gemma4iOS
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "用于语音输入"
        NSSpeechRecognitionUsageDescription: "用于语音转文字"
        NSPhotoLibraryUsageDescription: "用于选择图片发送给模型"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.momo.Gemma4iOS
      DEVELOPMENT_TEAM: P2GN9QW8E5
      CODE_SIGN_STYLE: Automatic
